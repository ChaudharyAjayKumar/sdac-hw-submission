<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }

      header {
        height: 20px;
        width: 100%;
        background-color: black;
        color: white;
        padding: 10px;
        display: flex;
        justify-content: space-around;
      }
      a {
        text-decoration: none;
      }

      main {
        display: flex;
        justify-content: space-between;
        flex-direction: row;

        margin: 15px;

        height: 300px;
      }

      .item {
        display: flex;
        flex-direction: column;
        margin: 1.5px;
        justify-content: start;
        text-align: center;
      }

      @media (max-width: 785px) {
        header {
          height: 200px;
          width: 100%;
          background-color: black;
          color: white;
          padding: 10px;
          display: flex;
          flex-direction: column;
          align-items: center;
        }

        main {
          display: flex;
          justify-content: space-between;
          flex-direction: column;
          /* align-items: center; */

          margin: 15px;

          height: 300px;
        }

        .item {
          display: flex;
          flex-direction: column;
          margin: 1.5px;
          justify-content: space-between;
          text-align: center;
        }
      }
    </style>
  </head>
