<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap CSS v5.3.8 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>

  <body>
    <header>
      <!-- place navbar here -->
    </header>
    <main>
      <h1 class="text-center py-4">register with us</h1>
      <div
        class="container text-center "
      >
        <form action="login.html" class="shadow bg-secondary rounded p-4">
        <div
            class="container py-2"
        >
            <div
                class="row justify-content-center align-items-center g-2"
            >
                <div class="col-2"><label for="">Username:</label></div>
                <div class="col-2"><input type="text" class="rounded"></div>
                
            </div>
            
        </div>
        <div
            class="container py-2"
        >
            <div
                class="row justify-content-center align-items-center g-2"
            >
                <div class="col-2"><label for="">email:</label></div>
                <div class="col-2"><input type="email" class="rounded"></div>
                
            </div>
            
        </div>
        <div
            class="container py-2"
        >
            <div
                class="row justify-content-center align-items-center g-2"
            >
                <div class="col-2"><label for="">password:</label></div>
                <div class="col-2"><input type="password" class="rounded"></div>
                
            </div>
            <div
            class="container py-2 text-center"
        >
            <div
                class="row justify-content-center align-items-center g-2"
            >
                
                <div class="col-2"><a
                    name=""
                    id=""
                    class="btn btn-primary"
                    href="login.html"
                    role="button"
                    >Submit</a
                >
                </div>
                
            </div>
            
        </div>
            
        </div>
      </div>
    </form>  
    </main>
    <footer>
      <!-- place footer here -->
    </footer>
    <!-- Bootstrap JavaScript Bundle (includes Popper) -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
